# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.reasonix/config.toml > built-in defaults.
# Fields marked user/global only are not overridden by ./reasonix.toml.
# Secrets are named via api_key_env and stored in Reasonix's global .env; never put keys here.

config_version = 3
default_model = "deepseek-flash"

[agent]
cold_resume_prune = true

[tools]
bash_timeout_seconds = 120
mcp_call_timeout_seconds = 300

[tools.background_jobs]
stalled_warning_seconds = 900

[lsp]
enabled = true

[permissions]
allow = ["Bash(cd /Users/bigxin/Documents/Code/mcp/npm-publish && git status 2>&1)"]
[sandbox]
bash    = "enforce"
network = true

[[plugins]]
name    = "npm-publish"
command = "node"
args    = ["/Users/bigxin/Documents/Code/mcp/npm-publish/npm-mcp-server.js"]
env     = { NPM_TOKEN = "${NPM_TOKEN}" }
